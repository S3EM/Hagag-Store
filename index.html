<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>جهاز الحجامة الذكي | راحة فورية لآلام الظهر</title>
    <link rel="preconnect" href="https://images.unsplash.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Preload the Tajawal font CSS style sheet -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet" />
    </noscript>
    <!-- Inline Critical CSS for above-the-fold content -->
    <style>
      body {
        background-color: #09090b !important;
        color: #ffffff !important;
        font-family: 'Tajawal', sans-serif;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root {
        min-height: 100vh;
        background-color: #09090b;
      }
      /* Above-the-fold Critical Navigation Styling */
      header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 56px;
        z-index: 50;
        background-color: rgba(9, 9, 11, 0.8) !important;
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(39, 39, 42, 0.8);
      }
      .header-container {
        max-width: 448px;
        margin: 0 auto;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      /* Above-the-fold Main / Hero Styling to prevent layout shifting */
      main {
        max-width: 448px;
        margin: 0 auto;
        padding-top: 64px;
        padding-bottom: 80px;
        background-color: #09090b;
        box-sizing: border-box;
      }
      .hero-section {
        position: relative;
        padding: 48px 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        overflow: hidden;
      }
      .hero-glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 150%;
        height: 150%;
        background: radial-gradient(circle, rgba(153, 27, 27, 0.15) 0%, rgba(0,0,0,0) 70%);
        pointer-events: none;
        border-radius: 9999px;
      }
      .hero-card {
        z-index: 10;
        background-color: rgba(24, 24, 27, 0.6);
        border: 1px solid rgba(39, 39, 42, 1);
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 32px;
        backdrop-filter: blur(8px);
      }
      .hero-title {
        font-size: 30px;
        font-weight: 900;
        color: #ffffff;
        line-height: 1.25;
        margin-bottom: 16px;
      }
      .hero-image-container {
        position: relative;
        width: 100%;
        height: 288px;
        border-radius: 16px;
        overflow: hidden;
        background-color: #18181b;
        border: 1px solid rgba(239, 68, 68, 0.1);
      }
    </style>
  </head>
  <body class="bg-zinc-950 text-white font-tajawal overflow-x-hidden antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
